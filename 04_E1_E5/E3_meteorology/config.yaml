experiment: E3_meteorology
model: E3_meteorology_aware_xgboost
backbone: XGBoost fixed tabular backbone
features:
- current_speed_input
- free_flow_speed_input
- current_travel_time_input
- tti_input
- speed_ratio_input
- speed_drop_input
- travel_time_delay_input
- speed_deficit_ratio_input
- missing_mask
- gap_length_steps
- coverage_ratio_6h
- coverage_ratio_24h
- volatility_tti_3h
- volatility_tti_6h
- confidence_input
- reliability_score
- hour_sin
- hour_cos
- dayofweek_sin
- dayofweek_cos
- is_weekend
- is_public_holiday
- is_school_holiday
- is_holiday_eve
- is_day_after_holiday
- temperature_2m
- relative_humidity_2m
- dew_point_2m
- surface_pressure
- wind_speed_10m
- wind_gusts_10m
- wind_u
- wind_v
- wind_calm_flag
- wind_gust_ratio
- wind_gust_ratio_missing_flag
- cloud_cover
- boundary_layer_height
- shortwave_radiation
- weather_missing_flag
node_identity: training-category one-hot
horizons:
- 1
- 3
- 6
seeds:
- 42
- 2025
- 20260623
- 20260715
- 20260718
model_selection_split: validation
test_used_for_selection: false
xgboost_parameters_except_seed:
  n_estimators: 700
  max_depth: 6
  learning_rate: 0.03
  min_child_weight: 5
  subsample: 0.85
  colsample_bytree: 0.85
  reg_lambda: 5.0
  reg_alpha: 0.05
  objective: reg:squarederror
  eval_metric: mae
  tree_method: hist
  device: cuda
  random_state: per_seed
  n_jobs: 4
  early_stopping_rounds: 60
