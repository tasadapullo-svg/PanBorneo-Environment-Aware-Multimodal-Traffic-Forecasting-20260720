project: T2 Transportmetrica B submission-grade experiments
release_date: '2026-07-19'
timezone: Asia/Kuching
main_resolution: 1h
node_count: 51
node_order_rule: node_order_verified then corridor_km; never lexical node_id order
target_type: point_speed
targets:
  h1: current_speed(t+1h)
  h3: current_speed(t+3h)
  h6: current_speed(t+6h)
split_rule: fixed chronological split with horizon-boundary purge
split_time_ranges:
  train:
    start: '2025-12-08 13:00:00'
    end: '2026-02-04 06:00:00'
    node_hours: 70686
  validation:
    start: '2026-02-04 07:00:00'
    end: '2026-02-16 15:00:00'
    node_hours: 15147
  test:
    start: '2026-02-16 16:00:00'
    end: '2026-02-28 23:00:00'
    node_hours: 15096
uq_partition_rule: fixed predeclared validation subdivision; calibration is never
  test
random_seeds:
- 42
- 2025
- 20260623
- 20260715
- 20260718
main_metric: MAE
auxiliary_metrics:
- RMSE
- sMAPE
- R2
traffic_missing_rule: causal last-observation-carried-forward; origin excluded when
  no past observation exists
environment_missing_rule: training-only median imputation where required
weather_source: Open-Meteo Historical Weather API
atmospheric_source: CAMS-derived gridded atmospheric composition data accessed through
  Open-Meteo
forbidden_descriptions:
- fixed ECMWF IFS weather source
- roadside air-quality observations
- ground-station air-quality observations
- official haze for upper-quartile pollution labels
