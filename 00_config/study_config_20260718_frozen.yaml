project_name: T2_environment_aware_multimodal_forecasting
project_title: Environment-Aware Multimodal Traffic Speed Forecasting for a Tropical
  Highway Corridor Using Floating-Car, Weather, and Gridded Atmospheric Data
release_date: '2026-07-18'
timezone: Asia/Kuching
main_resolution: 1h
node_count: 51
target_type: point_speed
target_definitions:
  h1: current_speed(t+1h)
  h3: current_speed(t+3h)
  h6: current_speed(t+6h)
forecast_horizons_hours:
- 1
- 3
- 6
history_windows_hours:
- 24
- 72
- 168
split_rule: fixed_chronological_split_with_horizon_boundary_purge
scaler_rule: training_only
node_order_rule: node_order_verified_then_corridor_km
traffic_missing_rule: causal_last_observation_carried_forward; origin excluded if
  no past observation
environment_missing_rule: training_only_median_if_required
random_seeds:
- 42
- 2025
- 20260623
- 20260715
- 20260718
main_metric: MAE
auxiliary_metrics:
- RMSE
- sMAPE
- R2
weather_source: Open-Meteo Historical Weather API
atmospheric_source: CAMS-derived gridded atmospheric composition data accessed through
  Open-Meteo
source_zip_sha256: debef11ff64d6ecf3559673c4584a0562e41b62096f0718301d90049e1e7c448
predictor_groups:
  traffic:
  - current_speed_input
  - free_flow_speed_input
  - current_travel_time_input
  - tti_input
  - speed_ratio_input
  - speed_drop_input
  - travel_time_delay_input
  - speed_deficit_ratio_input
  reliability:
  - missing_mask
  - gap_length_steps
  - coverage_ratio_6h
  - coverage_ratio_24h
  - volatility_tti_3h
  - volatility_tti_6h
  - confidence_input
  - reliability_score
  calendar:
  - hour_sin
  - hour_cos
  - dayofweek_sin
  - dayofweek_cos
  - is_weekend
  - is_public_holiday
  - is_school_holiday
  - is_holiday_eve
  - is_day_after_holiday
  rainfall:
  - precipitation
  - rain_flag
  - rain_lag_1h
  - rain_lag_3h
  - rain_lag_6h
  - rain_sum_3h
  - rain_sum_6h
  - rain_sum_12h
  - rain_sum_24h
  - rain_max_3h
  - rain_max_6h
  - post_rain_1_3h
  - post_rain_4_6h
  - post_rain_7_12h
  - rain_missing_flag
  meteorology:
  - temperature_2m
  - relative_humidity_2m
  - dew_point_2m
  - surface_pressure
  - wind_speed_10m
  - wind_gusts_10m
  - wind_u
  - wind_v
  - wind_calm_flag
  - wind_gust_ratio
  - wind_gust_ratio_missing_flag
  - cloud_cover
  - boundary_layer_height
  - shortwave_radiation
  - weather_missing_flag
  atmospheric_context:
  - pm2_5
  - pm10
  - nitrogen_dioxide
  - carbon_monoxide
  - ozone
  - sulphur_dioxide
  - aerosol_optical_depth
  - dust
  - pm2_5_lag_1h
  - pm2_5_lag_3h
  - pm2_5_lag_6h
  - pm2_5_mean_3h
  - pm2_5_mean_6h
  - pm2_5_mean_24h
  - aerosol_optical_depth_lag_1h
  - aerosol_optical_depth_lag_3h
  - aerosol_optical_depth_lag_6h
  - aerosol_optical_depth_mean_3h
  - aerosol_optical_depth_mean_6h
  - aerosol_optical_depth_mean_24h
  - nitrogen_dioxide_lag_1h
  - nitrogen_dioxide_lag_3h
  - nitrogen_dioxide_lag_6h
  - nitrogen_dioxide_mean_3h
  - nitrogen_dioxide_mean_6h
  - nitrogen_dioxide_mean_24h
  - ozone_mean_8h
  - air_quality_missing_flag
  road_context:
  - corridor_km
  - elevation_m
  - road_class
  - lane_count
  - lane_count_missing_flag
  - urban_rural
  - distance_to_nearest_junction
  - osm_bridge_tagged
  - distance_to_settlement
  - distance_to_major_intersection
evaluation_only_columns:
- upper_quartile_pm25_context
- upper_quartile_aod_context
- rain_with_upper_quartile_pollution
- any_grid_rain_flag
- localized_rain_flag
- widespread_rain_flag
- localized_high_intensity_flag
- corridor_average_rain_flag
formal_stage_scope:
- data_finalization
- E0
- E1
- E2
- E3
- E4
- E5
